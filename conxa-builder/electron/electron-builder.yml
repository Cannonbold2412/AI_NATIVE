# Conxa Build Studio — electron-builder configuration
# Produces a per-machine NSIS installer for Windows.
# The backend PyInstaller bundle is injected as an extraResource so it lands in
# resources/backend/ — matching process.resourcesPath used in main.js.

appId: ai.conxa.build-studio
productName: Conxa Build Studio
copyright: "Copyright © Conxa AI"

# Files to include in the app bundle
files:
  - "**/*"
  - "!node_modules/.cache"
  - "!renderer/src"      # compiled renderer goes to renderer/dist; exclude source
  - "!test"

# PyInstaller backend bundle — placed in resources/ so process.resourcesPath resolves it
extraResources:
  - from: "../../dist/backend"
    to: "backend"
    filter:
      - "**/*"

directories:
  buildResources: build
  output: dist/studio

# Auto-update via GitHub Releases (electron-updater)
publish:
  provider: github
  owner: conxa-ai
  repo: conxa-build-studio
  private: true
  releaseType: release

# Update channels: stable (default) + beta (opt-in)
# The running app reads the channel from electron-store; this sets the build
# channel metadata that electron-updater reads from latest.yml / latest-beta.yml.

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # EV code signing — configure via CSC_LINK + CSC_KEY_PASSWORD secrets in CI.
  # In V1 we ship unsigned; add signing in V1.1 when the EV cert is procured.
  signingHashAlgorithms:
    - sha256

nsis:
  # Per-machine install (requires elevation) so it works on shared workstations.
  perMachine: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Conxa Build Studio

  # Register the conxa-studio:// OAuth callback URI scheme.
  include: build/installer.nsh

