services:
  - type: web
    name: ai-native-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SKILL_ENVIRONMENT
        value: production
      - key: SKILL_AUTH_REQUIRED
        value: "true"
      - key: SKILL_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SKILL_CORS_PREVIEW_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: SKILL_CLERK_ISSUER
        sync: false
      - key: SKILL_CLERK_JWKS_URL
        sync: false
      - key: SKILL_CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: SKILL_CLERK_AUDIENCE
        sync: false
      - key: SKILL_DATABASE_URL
        sync: false
      - key: SKILL_REDIS_URL
        sync: false
      - key: SKILL_BLOB_READ_WRITE_TOKEN
        sync: false
      - key: SKILL_LLM_API_KEY
        sync: false
      - key: SKILL_PACK_LLM_API_KEY
        sync: false

  - type: worker
    name: ai-native-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python -m app.worker
    autoDeploy: true
    envVars:
      - key: SKILL_ENVIRONMENT
        value: production
      - key: SKILL_DATABASE_URL
        sync: false
      - key: SKILL_REDIS_URL
        sync: false
      - key: SKILL_BLOB_READ_WRITE_TOKEN
        sync: false
      - key: SKILL_LLM_API_KEY
        sync: false
      - key: SKILL_PACK_LLM_API_KEY
        sync: false
