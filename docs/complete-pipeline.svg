<svg viewBox="0 0 1200 2000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #666; }
      .stage-box { fill: #667eea; stroke: #333; stroke-width: 2; rx: 10; }
      .data-box { fill: #e6f2ff; stroke: #667eea; stroke-width: 2; }
      .step-box { fill: #fff; stroke: #667eea; stroke-width: 2; }
      .text { font-size: 13px; fill: #333; font-family: Arial; }
      .text-white { font-size: 12px; fill: #fff; font-weight: bold; font-family: Arial; }
      .label { font-size: 11px; fill: #666; font-family: Arial; }
      .arrow { stroke: #667eea; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-alt { stroke: #ff6b6b; stroke-width: 2; fill: none; marker-end: url(#arrowhead-alt); stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#667eea"/>
    </marker>
    <marker id="arrowhead-alt" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" class="title">🚀 CONXA: COMPLETE END-TO-END PIPELINE</text>
  <text x="600" y="75" text-anchor="middle" class="subtitle">From User Recording to Distributed Skill Package</text>

  <!-- STAGE 1: RECORDING -->
  <g>
    <rect x="50" y="110" width="1100" height="70" class="stage-box" rx="10"/>
    <text x="600" y="150" text-anchor="middle" class="text-white" font-size="18">STAGE 1: 📹 RECORDING (Browser Capture)</text>
  </g>

  <!-- Recording details -->
  <g>
    <rect x="50" y="200" width="350" height="120" class="data-box" rx="8"/>
    <circle cx="115" cy="240" r="12" class="stage-box"/>
    <text x="115" y="246" text-anchor="middle" class="text-white" font-size="10">1</text>
    <text x="225" y="240" class="text" font-weight="bold">Browser Automation</text>
    <text x="70" y="260" class="label">• Playwright Chrome</text>
    <text x="70" y="276" class="label">• Real user actions</text>
    <text x="70" y="292" class="label">• DOM capture</text>
    <text x="70" y="308" class="label">• Screenshots</text>
  </g>

  <g>
    <rect x="425" y="200" width="350" height="120" class="data-box" rx="8"/>
    <circle cx="490" cy="240" r="12" class="stage-box"/>
    <text x="490" y="246" text-anchor="middle" class="text-white" font-size="10">2</text>
    <text x="600" y="240" class="text" font-weight="bold">Event Queue</text>
    <text x="445" y="260" class="label">• Thread-safe queue</text>
    <text x="445" y="276" class="label">• SimpleQueue buffer</text>
    <text x="445" y="292" class="label">• Serialization</text>
    <text x="445" y="308" class="label">• ~50 events/min</text>
  </g>

  <g>
    <rect x="800" y="200" width="350" height="120" class="data-box" rx="8"/>
    <circle cx="865" cy="240" r="12" class="stage-box"/>
    <text x="865" y="246" text-anchor="middle" class="text-white" font-size="10">3</text>
    <text x="975" y="240" class="text" font-weight="bold">Session Storage</text>
    <text x="820" y="260" class="label">• events.jsonl</text>
    <text x="820" y="276" class="label">• Full screenshots</text>
    <text x="820" y="292" class="label">• Element snapshots</text>
    <text x="820" y="308" class="label">• Metadata</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 330 L 600 380" class="arrow"/>

  <!-- STAGE 2: PIPELINE PROCESSING -->
  <g>
    <rect x="50" y="380" width="1100" height="70" class="stage-box" rx="10"/>
    <text x="600" y="420" text-anchor="middle" class="text-white" font-size="18">STAGE 2: ⚙️ PIPELINE PROCESSING (Cleaning &amp; Enrichment)</text>
  </g>

  <!-- Pipeline stages -->
  <g>
    <rect x="50" y="470" width="220" height="140" class="step-box" rx="8"/>
    <text x="160" y="495" text-anchor="middle" class="text" font-weight="bold">Validation</text>
    <text x="70" y="515" class="label">✓ Schema check</text>
    <text x="70" y="530" class="label">✓ Type validation</text>
    <text x="70" y="545" class="label">✓ Required fields</text>
    <text x="70" y="560" class="label">✓ Reject invalid</text>
    <text x="70" y="575" class="label">✓ Log errors</text>
  </g>

  <g>
    <rect x="280" y="470" width="220" height="140" class="step-box" rx="8"/>
    <text x="390" y="495" text-anchor="middle" class="text" font-weight="bold">Cleaning</text>
    <text x="300" y="515" class="label">✓ Normalize text</text>
    <text x="300" y="530" class="label">✓ Collapse WS</text>
    <text x="300" y="545" class="label">✓ Dedupe classes</text>
    <text x="300" y="560" class="label">✓ Sort selectors</text>
    <text x="300" y="575" class="label">✓ Truncate (2k)</text>
  </g>

  <g>
    <rect x="510" y="470" width="220" height="140" class="step-box" rx="8"/>
    <text x="620" y="495" text-anchor="middle" class="text" font-weight="bold">Deduplication</text>
    <text x="530" y="515" class="label">✓ Merge scrolls</text>
    <text x="530" y="530" class="label">✓ Keep 1st image</text>
    <text x="530" y="545" class="label">✓ Remove dups</text>
    <text x="530" y="560" class="label">✓ Reduce noise</text>
    <text x="530" y="575" class="label">✓ Update seq #</text>
  </g>

  <g>
    <rect x="740" y="470" width="220" height="140" class="step-box" rx="8"/>
    <text x="850" y="495" text-anchor="middle" class="text" font-weight="bold">LLM Enrichment</text>
    <text x="760" y="515" class="label">✓ Semantic intent</text>
    <text x="760" y="530" class="label">✓ Normalize text</text>
    <text x="760" y="545" class="label">✓ Input type</text>
    <text x="760" y="560" class="label">✓ Confidence</text>
    <text x="760" y="575" class="label">✓ Role/ARIA</text>
  </g>

  <g>
    <rect x="970" y="470" width="180" height="140" class="step-box" rx="8"/>
    <text x="1060" y="495" text-anchor="middle" class="text" font-weight="bold">Scroll Anno</text>
    <text x="990" y="515" class="label">✓ Calculate delta</text>
    <text x="990" y="530" class="label">✓ Track position</text>
    <text x="990" y="545" class="label">✓ Annotate amount</text>
    <text x="990" y="560" class="label">✓ Output: 2.0.0</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 610 L 600 660" class="arrow"/>

  <!-- STAGE 3: HUMAN EDITING -->
  <g>
    <rect x="50" y="660" width="1100" height="70" class="stage-box" rx="10"/>
    <text x="600" y="700" text-anchor="middle" class="text-white" font-size="18">STAGE 3: ✏️ HUMAN EDITING (Manual Refinement)</text>
  </g>

  <!-- Editing UI -->
  <g>
    <rect x="50" y="750" width="1100" height="160" class="data-box" rx="8"/>
    <text x="600" y="780" text-anchor="middle" class="text" font-weight="bold">Frontend Editor (Next.js)</text>

    <text x="70" y="810" class="label" font-weight="bold">Human Review:</text>
    <text x="70" y="830" class="label">
      • Verify LLM intent matches actual action intent
    </text>
    <text x="70" y="850" class="label">
      • Review and adjust selectors (prefer ID &gt; class &gt; text)
    </text>
    <text x="70" y="870" class="label">
      • Fine-tune timing (wait_before, wait_after, timeout)
    </text>
    <text x="70" y="890" class="label">
      • Add validation rules (success criteria, expected state changes)
    </text>
  </g>

  <!-- Arrow -->
  <path d="M 600 910 L 600 960" class="arrow"/>

  <!-- STAGE 4: COMPILATION -->
  <g>
    <rect x="50" y="960" width="1100" height="70" class="stage-box" rx="10"/>
    <text x="600" y="1000" text-anchor="middle" class="text-white" font-size="18">STAGE 4: 🔧 COMPILATION (Skill Generation)</text>
  </g>

  <!-- Compilation steps -->
  <g>
    <rect x="50" y="1050" width="280" height="130" class="step-box" rx="8"/>
    <text x="190" y="1075" text-anchor="middle" class="text" font-weight="bold">Action Extraction</text>
    <text x="70" y="1095" class="label">→ Event to Action</text>
    <text x="70" y="1110" class="label">→ Type classification</text>
    <text x="70" y="1125" class="label">→ Parameter binding</text>
    <text x="70" y="1140" class="label">→ Selector selection</text>
    <text x="70" y="1155" class="label">→ Fallbacks</text>
  </g>

  <g>
    <rect x="340" y="1050" width="280" height="130" class="step-box" rx="8"/>
    <text x="480" y="1075" text-anchor="middle" class="text" font-weight="bold">Selector Scoring</text>
    <text x="360" y="1095" class="label">→ ID selectors: +0.2</text>
    <text x="360" y="1110" class="label">→ Class selectors: -0.1</text>
    <text x="360" y="1125" class="label">→ XPath: -0.1</text>
    <text x="360" y="1140" class="label">→ Text-based: -0.2</text>
    <text x="360" y="1155" class="label">→ Rank: 0.0-1.0</text>
  </g>

  <g>
    <rect x="630" y="1050" width="280" height="130" class="step-box" rx="8"/>
    <text x="770" y="1075" text-anchor="middle" class="text" font-weight="bold">Intent Validation</text>
    <text x="650" y="1095" class="label">→ Semantic check</text>
    <text x="650" y="1110" class="label">→ Consistency rules</text>
    <text x="650" y="1125" class="label">→ Dependency graph</text>
    <text x="650" y="1140" class="label">→ Topological sort</text>
    <text x="650" y="1155" class="label">→ Validation rules</text>
  </g>

  <g>
    <rect x="920" y="1050" width="230" height="130" class="step-box" rx="8"/>
    <text x="1035" y="1075" text-anchor="middle" class="text" font-weight="bold">Output: skills.json</text>
    <text x="940" y="1095" class="label">→ All steps</text>
    <text x="940" y="1110" class="label">→ Parameters</text>
    <text x="940" y="1125" class="label">→ Validation</text>
    <text x="940" y="1140" class="label">→ Version</text>
    <text x="940" y="1155" class="label">→ Metadata</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 1180 L 600 1230" class="arrow"/>

  <!-- STAGE 5: PACKAGE GENERATION -->
  <g>
    <rect x="50" y="1230" width="1100" height="70" class="stage-box" rx="10"/>
    <text x="600" y="1270" text-anchor="middle" class="text-white" font-size="18">STAGE 5: 📦 PACKAGE GENERATION (Distribution Ready)</text>
  </g>

  <!-- Package contents -->
  <g>
    <rect x="50" y="1320" width="260" height="150" class="data-box" rx="8"/>
    <text x="180" y="1345" text-anchor="middle" class="text" font-weight="bold">📋 README.md</text>
    <text x="70" y="1365" class="label">• Skill descriptions</text>
    <text x="70" y="1380" class="label">• Parameter docs</text>
    <text x="70" y="1395" class="label">• Success criteria</text>
    <text x="70" y="1410" class="label">• Example usage</text>
    <text x="70" y="1425" class="label">• Combination tips</text>
    <text x="70" y="1440" class="label">• Error handling</text>
  </g>

  <g>
    <rect x="320" y="1320" width="260" height="150" class="data-box" rx="8"/>
    <text x="450" y="1345" text-anchor="middle" class="text" font-weight="bold">⚙️ execute.py</text>
    <text x="340" y="1365" class="label">• Skill executor</text>
    <text x="340" y="1380" class="label">• Browser mgmt</text>
    <text x="340" y="1395" class="label">• Step execution</text>
    <text x="340" y="1410" class="label">• Validation logic</text>
    <text x="340" y="1425" class="label">• Error handling</text>
    <text x="340" y="1440" class="label">• State tracking</text>
  </g>

  <g>
    <rect x="590" y="1320" width="260" height="150" class="data-box" rx="8"/>
    <text x="720" y="1345" text-anchor="middle" class="text" font-weight="bold">🧠 recovery.py</text>
    <text x="610" y="1365" class="label">• LLM recovery</text>
    <text x="610" y="1380" class="label">• Failure analysis</text>
    <text x="610" y="1395" class="label">• Selector retry</text>
    <text x="610" y="1410" class="label">• Alternative paths</text>
    <text x="610" y="1425" class="label">• Logging</text>
    <text x="610" y="1440" class="label">• Metrics</text>
  </g>

  <g>
    <rect x="860" y="1320" width="290" height="150" class="data-box" rx="8"/>
    <text x="1005" y="1345" text-anchor="middle" class="text" font-weight="bold">👁️ vision_recovery.py</text>
    <text x="880" y="1365" class="label">• Vision analysis</text>
    <text x="880" y="1380" class="label">• Element detection</text>
    <text x="880" y="1395" class="label">• Bbox extraction</text>
    <text x="880" y="1410" class="label">• Candidate scoring</text>
    <text x="880" y="1425" class="label">• Intent matching</text>
    <text x="880" y="1440" class="label">• Coordinates</text>
  </g>

  <!-- Arrow -->
  <path d="M 600 1470 L 600 1520" class="arrow"/>

  <!-- STAGE 6: PUBLISHING -->
  <g>
    <rect x="50" y="1520" width="1100" height="70" class="stage-box" rx="10"/>
    <text x="600" y="1560" text-anchor="middle" class="text-white" font-size="18">STAGE 6: 🌐 PUBLISHING (GitHub Distribution)</text>
  </g>

  <!-- Publishing details -->
  <g>
    <rect x="50" y="1610" width="1100" height="130" class="data-box" rx="8"/>

    <text x="70" y="1635" class="label" font-weight="bold">GitHub Package Repository</text>
    <text x="70" y="1655" class="label">
      • skill_package/{branch}/{version}/ directory
    </text>
    <text x="70" y="1675" class="label">
      • Version tags (v1.0.0, v1.0.1, etc.)
    </text>
    <text x="70" y="1695" class="label">
      • Release notes with changelog
    </text>
    <text x="70" y="1715" class="label">
      • Discoverable via registry (GitHub API)
    </text>
  </g>

  <!-- Arrow -->
  <path d="M 600 1740 L 600 1790" class="arrow"/>

  <!-- STAGE 7: EXECUTION -->
  <g>
    <rect x="50" y="1790" width="1100" height="70" class="stage-box" rx="10"/>
    <text x="600" y="1830" text-anchor="middle" class="text-white" font-size="18">STAGE 7: ⚡ EXECUTION &amp; AUTOMATION (Production Use)</text>
  </g>

  <!-- Execution options -->
  <g>
    <rect x="50" y="1880" width="350" height="90" class="step-box" rx="8"/>
    <text x="225" y="1905" text-anchor="middle" class="text" font-weight="bold">Claude Agent</text>
    <text x="70" y="1925" class="label">
      • Read README.md
    </text>
    <text x="70" y="1940" class="label">
      • Plan skill combination
    </text>
    <text x="70" y="1955" class="label">
      • Call execute.py
    </text>
  </g>

  <g>
    <rect x="425" y="1880" width="350" height="90" class="step-box" rx="8"/>
    <text x="600" y="1905" text-anchor="middle" class="text" font-weight="bold">API Server</text>
    <text x="445" y="1925" class="label">
      • HTTP endpoint
    </text>
    <text x="445" y="1940" class="label">
      • Load &amp; execute
    </text>
    <text x="445" y="1955" class="label">
      • Return results
    </text>
  </g>

  <g>
    <rect x="800" y="1880" width="350" height="90" class="step-box" rx="8"/>
    <text x="975" y="1905" text-anchor="middle" class="text" font-weight="bold">User Workflow</text>
    <text x="820" y="1925" class="label">
      • Interactive flow
    </text>
    <text x="820" y="1940" class="label">
      • Real-time feedback
    </text>
    <text x="820" y="1955" class="label">
      • Recovery handling
    </text>
  </g>

  <!-- Final result -->
  <g>
    <rect x="50" y="1990" width="1100" height="30" class="stage-box" rx="10"/>
    <text x="600" y="2010" text-anchor="middle" class="text-white" font-weight="bold">✅ WORKFLOW AUTOMATED</text>
  </g>
</svg>
