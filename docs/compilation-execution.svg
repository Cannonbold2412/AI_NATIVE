<svg viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 14px; fill: #666; }
      .box { fill: #fff; stroke: #667eea; stroke-width: 2; }
      .process { fill: #667eea; stroke: #333; stroke-width: 2; }
      .data { fill: #e6f2ff; stroke: #667eea; stroke-width: 2; }
      .compile { fill: #d4c5f9; stroke: #8e7cc3; stroke-width: 2; }
      .execute { fill: #a8e6cf; stroke: #56c596; stroke-width: 2; }
      .recovery { fill: #ffd3b6; stroke: #ffaa5a; stroke-width: 2; }
      .text { font-size: 13px; fill: #333; font-family: Arial; }
      .label { font-size: 12px; fill: #666; font-family: Arial; }
      .text-white { font-size: 12px; fill: #fff; font-weight: bold; font-family: Arial; }
      .arrow { stroke: #667eea; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-green { stroke: #56c596; stroke-width: 2; fill: none; marker-end: url(#arrowhead-green); }
      .arrow-orange { stroke: #ffaa5a; stroke-width: 2; fill: none; marker-end: url(#arrowhead-orange); }
      .code { font-family: 'Courier New'; font-size: 10px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#667eea"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#56c596"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ffaa5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" class="title">🔧 COMPILATION &amp; EXECUTION FLOW</text>
  <text x="500" y="60" text-anchor="middle" class="subtitle">From Edited Events to Executable Skill with Self-Healing Recovery</text>

  <!-- COMPILATION PHASE -->
  <g>
    <rect x="50" y="90" width="900" height="50" class="compile" rx="8"/>
    <text x="500" y="125" text-anchor="middle" class="text" font-weight="bold" font-size="16">PHASE 1: SKILL COMPILATION</text>
  </g>

  <!-- Step 1: Action Extraction -->
  <g>
    <rect x="50" y="170" width="280" height="140" class="box" rx="8"/>
    <circle cx="90" cy="200" r="15" class="process"/>
    <text x="90" y="207" text-anchor="middle" class="text-white">1</text>
    <text x="190" y="200" class="text" font-weight="bold">Action Extraction</text>
    <text x="70" y="220" class="label">Convert events to</text>
    <text x="70" y="235" class="label">executable actions:</text>
    <text x="70" y="250" class="label">• click → Action{type}</text>
    <text x="70" y="265" class="label">• type → Action{text}</text>
    <text x="70" y="280" class="label">• navigate → Action{url}</text>
  </g>

  <!-- Arrow -->
  <path d="M 330 240 L 380 240" class="arrow"/>

  <!-- Step 2: Selector Scoring -->
  <g>
    <rect x="380" y="170" width="280" height="140" class="box" rx="8"/>
    <circle cx="420" cy="200" r="15" class="process"/>
    <text x="420" y="207" text-anchor="middle" class="text-white">2</text>
    <text x="520" y="200" class="text" font-weight="bold">Selector Scoring</text>
    <text x="400" y="220" class="label">Rank selectors by</text>
    <text x="400" y="235" class="label">stability (0.0-1.0):</text>
    <text x="400" y="250" class="label">ID-based: +0.2</text>
    <text x="400" y="265" class="label">Class-based: -0.1</text>
    <text x="400" y="280" class="label">Text-based: -0.2</text>
  </g>

  <!-- Arrow -->
  <path d="M 660 240 L 710 240" class="arrow"/>

  <!-- Step 3: Intent Validation -->
  <g>
    <rect x="710" y="170" width="240" height="140" class="box" rx="8"/>
    <circle cx="745" cy="200" r="15" class="process"/>
    <text x="745" y="207" text-anchor="middle" class="text-white">3</text>
    <text x="825" y="200" class="text" font-weight="bold">Intent Validation</text>
    <text x="730" y="220" class="label">Verify semantic:</text>
    <text x="730" y="235" class="label">click+button=✓</text>
    <text x="730" y="250" class="label">type+input=✓</text>
    <text x="730" y="265" class="label">nav+url=✓</text>
  </g>

  <!-- Arrow -->
  <path d="M 500 310 L 500 360" class="arrow"/>

  <!-- Compiled Skill Output -->
  <g>
    <rect x="50" y="360" width="900" height="180" class="compile" rx="8"/>
    <text x="500" y="390" text-anchor="middle" class="text" font-weight="bold" font-size="15">📋 COMPILED SKILL (skills.json)</text>

    <text x="70" y="415" class="code">
      <tspan x="70">{</tspan>
      <tspan x="70" y="430">  "name": "login_workflow",</tspan>
      <tspan x="70" y="445">  "steps": [</tspan>
      <tspan x="70" y="460">    {</tspan>
      <tspan x="70" y="475">      "id": "step_1",</tspan>
      <tspan x="70" y="490">      "action": "navigate",</tspan>
      <tspan x="70" y="505">      "url": "https://example.com/login",</tspan>
      <tspan x="70" y="520">      "wait_after_ms": 2000</tspan>
    </text>

    <text x="400" y="415" class="code">
      <tspan x="400">    },</tspan>
      <tspan x="400" y="430">    {</tspan>
      <tspan x="400" y="445">      "id": "step_2",</tspan>
      <tspan x="400" y="460">      "action": "type",</tspan>
      <tspan x="400" y="475">      "selector": "input[name='email']",</tspan>
      <tspan x="400" y="490">      "text": "${email}",</tspan>
      <tspan x="400" y="505">      "selector_confidence": 0.95</tspan>
    </text>

    <text x="700" y="415" class="code">
      <tspan x="700">    }</tspan>
      <tspan x="700" y="430">  ],</tspan>
      <tspan x="700" y="445">  "parameters": [</tspan>
      <tspan x="700" y="460">    { "name": "email", ... },</tspan>
      <tspan x="700" y="475">    { "name": "password", ... }</tspan>
      <tspan x="700" y="490">  ]</tspan>
      <tspan x="700" y="505">}</tspan>
    </text>
  </g>

  <!-- Arrow -->
  <path d="M 500 540 L 500 590" class="arrow-green"/>
  <text x="520" y="565" class="label" font-weight="bold">EXECUTION PHASE</text>

  <!-- EXECUTION PHASE -->
  <g>
    <rect x="50" y="590" width="900" height="50" class="execute" rx="8"/>
    <text x="500" y="625" text-anchor="middle" class="text" font-weight="bold" font-size="16">PHASE 2: SKILL EXECUTION</text>
  </g>

  <!-- Browser Setup -->
  <g>
    <rect x="50" y="670" width="280" height="120" class="box" rx="8"/>
    <circle cx="90" cy="695" r="15" class="process"/>
    <text x="90" y="702" text-anchor="middle" class="text-white">1</text>
    <text x="190" y="695" class="text" font-weight="bold">Browser Setup</text>
    <text x="70" y="715" class="label">Launch Playwright</text>
    <text x="70" y="730" class="label">Chrome instance</text>
    <text x="70" y="745" class="label">Inject recovery</text>
    <text x="70" y="760" class="label">hooks</text>
  </g>

  <!-- Arrow -->
  <path d="M 330 730 L 380 730" class="arrow-green"/>

  <!-- Execute Steps -->
  <g>
    <rect x="380" y="670" width="280" height="120" class="box" rx="8"/>
    <circle cx="420" cy="695" r="15" class="process"/>
    <text x="420" y="702" text-anchor="middle" class="text-white">2</text>
    <text x="480" y="695" class="text" font-weight="bold">Execute Each Step</text>
    <text x="400" y="715" class="label">For each action:</text>
    <text x="400" y="730" class="label">1. Find element</text>
    <text x="400" y="745" class="label">2. Perform action</text>
    <text x="400" y="760" class="label">3. Wait &amp; validate</text>
  </g>

  <!-- Arrow -->
  <path d="M 660 730 L 710 730" class="arrow-green"/>

  <!-- Validate -->
  <g>
    <rect x="710" y="670" width="240" height="120" class="box" rx="8"/>
    <circle cx="745" cy="695" r="15" class="process"/>
    <text x="745" y="702" text-anchor="middle" class="text-white">3</text>
    <text x="825" y="695" class="text" font-weight="bold">Validate Success</text>
    <text x="730" y="715" class="label">Check success</text>
    <text x="730" y="730" class="label">criteria:</text>
    <text x="730" y="745" class="label">URL, elements,</text>
    <text x="730" y="760" class="label">text presence</text>
  </g>

  <!-- Arrow to recovery -->
  <path d="M 500 790 L 500 840" class="arrow-orange"/>
  <text x="520" y="815" class="label" font-weight="bold" fill="#ff6b6b">IF FAILED</text>

  <!-- RECOVERY PHASE -->
  <g>
    <rect x="50" y="840" width="900" height="50" class="recovery" rx="8"/>
    <text x="500" y="875" text-anchor="middle" class="text" font-weight="bold" font-size="16">PHASE 3: 4-LAYER SELF-HEALING RECOVERY (Tiered)</text>
  </g>

  <!-- Layer 1: Selector Context -->
  <g>
    <rect x="50" y="920" width="210" height="160" class="recovery" rx="8"/>
    <text x="155" y="945" text-anchor="middle" class="text" font-weight="bold" font-size="12">L1: Selector Context</text>
    <text x="70" y="965" class="label" font-weight="bold">Try alternatives:</text>
    <text x="70" y="980" class="label">• Primary selector</text>
    <text x="70" y="995" class="label">• Alt selectors</text>
    <text x="70" y="1010" class="label">✅ 60-70% success</text>
    <text x="70" y="1025" class="label" fill="#667eea">⏱️ Instant</text>
  </g>

  <!-- Arrow -->
  <path d="M 260 1000 L 290 1000" class="arrow-orange" stroke-width="1.5"/>

  <!-- Layer 2: Text Anchors -->
  <g>
    <rect x="290" y="920" width="210" height="160" class="recovery" rx="8"/>
    <text x="395" y="945" text-anchor="middle" class="text" font-weight="bold" font-size="12">L2: Text Anchors</text>
    <text x="310" y="965" class="label" font-weight="bold">Priority search:</text>
    <text x="310" y="980" class="label">• "Submit" (1.0)</text>
    <text x="310" y="995" class="label">• Fallback texts</text>
    <text x="310" y="1010" class="label">✅ 50-60% success</text>
    <text x="310" y="1025" class="label" fill="#667eea">⏱️ Instant</text>
  </g>

  <!-- Arrow -->
  <path d="M 500 1000 L 530 1000" class="arrow-orange" stroke-width="1.5"/>

  <!-- Layer 3: Text Variants -->
  <g>
    <rect x="530" y="920" width="210" height="160" class="recovery" rx="8"/>
    <text x="635" y="945" text-anchor="middle" class="text" font-weight="bold" font-size="12">L3: Text Variants</text>
    <text x="550" y="965" class="label" font-weight="bold">Normalized search:</text>
    <text x="550" y="980" class="label">• Lowercase</text>
    <text x="550" y="995" class="label">• Role-based</text>
    <text x="550" y="1010" class="label">✅ 40-50% success</text>
    <text x="550" y="1025" class="label" fill="#667eea">⏱️ Instant</text>
  </g>

  <!-- Arrow -->
  <path d="M 740 1000 L 770 1000" class="arrow-orange" stroke-width="1.5"/>

  <!-- Layer 4: Vision Recovery -->
  <g>
    <rect x="770" y="920" width="230" height="160" class="recovery" rx="8"/>
    <text x="885" y="945" text-anchor="middle" class="text" font-weight="bold" font-size="12">L4: Vision Recovery</text>
    <text x="790" y="965" class="label" font-weight="bold">Vision LLM:</text>
    <text x="790" y="980" class="label">• Screenshot analysis</text>
    <text x="790" y="995" class="label">• Intent matching</text>
    <text x="790" y="1010" class="label">✅ 75-85% success</text>
    <text x="790" y="1025" class="label" fill="#ff8c00">⏱️ 120 seconds</text>
  </g>

  <!-- Arrow -->
  <path d="M 500 1100 L 500 1160" class="arrow-orange"/>

  <!-- Final Result -->
  <g>
    <rect x="50" y="1160" width="900" height="160" class="execute" rx="8"/>
    <text x="500" y="1190" text-anchor="middle" class="text" font-weight="bold" font-size="15">📊 EXECUTION RESULT</text>

    <rect x="70" y="1210" width="280" height="100" class="box" rx="6"/>
    <text x="210" y="1235" text-anchor="middle" class="text" font-weight="bold">Success Path</text>
    <text x="90" y="1255" class="label">All steps executed</text>
    <text x="90" y="1270" class="label">All validations passed</text>
    <text x="90" y="1285" class="label">Workflow complete ✅</text>

    <rect x="360" y="1210" width="280" height="100" class="box" rx="6"/>
    <text x="500" y="1235" text-anchor="middle" class="text" font-weight="bold">Partial Success</text>
    <text x="380" y="1255" class="label">N steps completed</text>
    <text x="380" y="1270" class="label">Recovery recovered 1</text>
    <text x="380" y="1285" class="label">Failed after M steps</text>

    <rect x="650" y="1210" width="300" height="100" class="box" rx="6"/>
    <text x="800" y="1235" text-anchor="middle" class="text" font-weight="bold">Complete Failure</text>
    <text x="670" y="1255" class="label">All 4 recovery layers</text>
    <text x="670" y="1270" class="label">failed to fix issue</text>
    <text x="670" y="1285" class="label">Manual intervention ❌</text>
  </g>

  <!-- Key Insights -->
  <g>
    <rect x="50" y="1350" width="900" height="140" class="box" stroke="#28a745" stroke-width="2" rx="8"/>
    <text x="500" y="1380" text-anchor="middle" class="text" font-weight="bold" fill="#28a745">✅ 4-LAYER RECOVERY STRATEGY</text>
    <text x="70" y="1405" class="label">
      <tspan font-weight="bold">• Layers 1-3 (Instant):</tspan> Selector alternatives, text anchors, text variants. Combined handle ~80% of failures in microseconds.
    </text>
    <text x="70" y="1425" class="label">
      <tspan font-weight="bold">• Layer 4 (Vision):</tspan> Vision LLM analysis (120s timeout) catches remaining ~20% from major UI changes. Combined success: ~95%
    </text>
    <text x="70" y="1445" class="label">
      <tspan font-weight="bold">• Retry Policy:</tspan> Element actions (2 attempts), Navigate/Check (3 attempts). Each attempt exhausts layers L1→L2→L3→L4 sequentially.
    </text>
    <text x="70" y="1465" class="label">
      <tspan font-weight="bold">• Intent-Aware:</tspan> Recovery uses semantic intent from compilation phase to score candidates intelligently across all layers.
    </text>
  </g>
</svg>
