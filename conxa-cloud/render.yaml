services:
  - type: web
    name: conxa-api
    plan: free
    runtime: python
    rootDir: conxa-cloud/backend/
    buildCommand: bash build.sh
    startCommand: bash start.sh
    healthCheckPath: /healthz
    envVars:
      - key: SKILL_AUTH_REQUIRED
        value: true
      - key: SKILL_DATABASE_URL
        fromDatabase:
          name: conxa-db
          property: connectionString
      - key: SKILL_CLERK_ISSUER
        sync: false
      - key: SKILL_CLERK_JWKS_URL
        sync: false
      - key: SKILL_CORS_ORIGINS
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SKILL_GROQ_ENABLED
        value: true
      - key: SKILL_GROQ_API_KEYS
        sync: false

databases:
  - name: conxa-db
    plan: free
    databaseName: conxa
    user: conxa
