services:
  - type: web
    name: conxa-api
    plan: free
    runtime: python
    rootDir: conxa-cloud/backend/
    buildCommand: bash build.sh
    startCommand: bash start.sh
    healthCheckPath: /healthz
    envVars:
      - key: SKILL_AUTH_REQUIRED
        value: true
      - key: SKILL_DATABASE_URL
        fromDatabase:
          name: conxa-db
          property: connectionString

databases:
  - name: conxa-db
    plan: free
    databaseName: conxa
    user: conxa
